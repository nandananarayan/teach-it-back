<!DOCTYPE html>
<html>
<head>
    <title>Teach It Back - Create Account</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
    <style>
        body { overflow-y: auto; }

        .glow-title {
            text-align: center;
            margin-top: 30px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 40px;
            text-shadow: 0 0 15px rgba(255,200,120,0.8);
        }

        .glass-panel {
            position: relative;
            width: 400px;
            margin: 120px auto 60px auto;
            padding: 40px;
            background: rgba(20, 25, 35, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            text-align: center;
            overflow: visible;
        }

        .glass-panel input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: 'Poppins', sans-serif;
            outline: none;
            box-sizing: border-box;
        }

        .glass-panel input::placeholder { color: #ccc; }

        .main-btn {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #5a3e2b;
            color: #f5e6c8;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255,200,120,0.4);
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255,200,120,0.6);
        }

        .toggle { margin-top: 20px; text-align: center; }
        .toggle a {
            display: block;
            text-align: center;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }
        .toggle a:hover { color: white; }

        /* Avatar */
        .avatar-section {
            position: relative;
            margin-bottom: 20px;
            padding: 100px 0 100px 0;
        }

        .avatar-display {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid rgba(255,200,120,0.4);
            transition: 0.3s;
            position: relative;
            z-index: 2;
        }

        .avatar-display:hover {
            box-shadow: 0 0 15px rgba(255,200,120,0.5);
        }

        .avatar-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-options {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .avatar {
            position: absolute;
            opacity: 0;
            transform: scale(0);
            transition: 0.4s ease;
            text-align: center;
            z-index: 10;
        }

        .avatar img {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,200,120,0.4);
        }

        .avatar p { font-size: 11px; margin-top: 3px; color: #ddd; }

        .top    { top: 0px;   left: 50%; transform: scale(0) translateX(-50%); }
        .bottom { bottom: 0px; left: 50%; transform: scale(0) translateX(-50%); }
        .left   { left: 0px;  top: 50%; transform: scale(0) translateY(-50%); }
        .right  { right: 0px; top: 50%; transform: scale(0) translateY(-50%); }

        .avatar-section.active .avatar {
            opacity: 1;
            pointer-events: auto;
        }

        .avatar-section.active .top    { transform: scale(1) translateX(-50%); }
        .avatar-section.active .bottom { transform: scale(1) translateX(-50%); }
        .avatar-section.active .left   { transform: scale(1) translateY(-50%); }
        .avatar-section.active .right  { transform: scale(1) translateY(-50%); }

        /* Password */
        .password-rules {
            list-style: none;
            padding: 0;
            margin: 6px 0 10px 0;
            font-size: 0.78rem;
            text-align: left;
        }

        .password-rules li { padding: 2px 0; transition: color 0.3s; }
        .password-rules li::before { content: "✗ "; color: #ff5e5e; }
        .password-rules li.met::before { content: "✓ "; color: #4cff91; }
        .password-rules li.met { color: #4cff91; }
        .password-rules li:not(.met) { color: #ff5e5e; }

        .password-strength-bar {
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.15);
            border-radius: 3px;
            margin: 6px 0 4px 0;
            overflow: hidden;
        }

        .password-strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.3s, background 0.3s;
        }

        .strength-label {
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-align: right;
            opacity: 0.85;
        }

        #confirm-password-msg {
            font-size: 0.78rem;
            margin: -4px 0 8px 0;
            min-height: 18px;
            text-align: left;
        }
    </style>
</head>
<body>

<video autoplay muted loop id="bg-video">
    <source src="Refining_Game_Background_Prompt.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<h1 class="glow-title">Create Account</h1>

<div class="glass-panel">

    <div class="avatar-section" id="avatar-section">
        <div class="avatar-display" onclick="toggleAvatars()">
            <span id="avatar-text">Avatar</span>
            <img id="selected-avatar" style="display:none;">
        </div>
        <div class="avatar-options">
            <div class="avatar top">
                <img src="Screenshot 2026-02-12 193451.png" onclick="selectAvatar(this)">
                <p>Zack</p>
            </div>
            <div class="avatar right">
                <img src="Screenshot 2026-02-12 193507.png" onclick="selectAvatar(this)">
                <p>Freddy</p>
            </div>
            <div class="avatar bottom">
                <img src="Screenshot 2026-02-12 193512.png" onclick="selectAvatar(this)">
                <p>Tomika</p>
            </div>
            <div class="avatar left">
                <img src="Screenshot 2026-02-12 193520.png" onclick="selectAvatar(this)">
                <p>Alicia</p>
            </div>
        </div>
    </div>

    <input type="text" id="full-name" placeholder="Full Name">
    <input type="number" id="age" placeholder="Age">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password-input" placeholder="Create Password" oninput="checkPassword()">

    <div class="password-strength-bar">
        <div class="password-strength-fill" id="strength-fill"></div>
    </div>
    <div class="strength-label" id="strength-label"></div>

    <ul class="password-rules">
        <li id="rule-length">At least 8 characters</li>
        <li id="rule-upper">At least one uppercase letter (A–Z)</li>
        <li id="rule-lower">At least one lowercase letter (a–z)</li>
        <li id="rule-number">At least one number (0–9)</li>
        <li id="rule-special">At least one special character (!@#$%^&*)</li>
    </ul>

    <input type="password" id="confirm-password-input" placeholder="Confirm Password" oninput="checkConfirmPassword()">
    <div id="confirm-password-msg"></div>

    <button class="main-btn" onclick="createAccount()">Create Account</button>

    <div class="toggle">
        <a href="index.html">Back to Login</a>
    </div>

</div>

<script src="signup.js"></script>
</body>
</html>
