<!DOCTYPE html>
<html>
<head>
    <title>Teach It Back - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 94, 94, 0.5);
            color: #ff5e5e;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 94, 94, 0.12);
            box-shadow: 0 0 12px rgba(255, 94, 94, 0.3);
        }
    </style>
</head>
<body>
<video autoplay muted loop id="bg-video">
    <source src="Refining_Game_Background_Prompt.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<nav class="top-nav">
    <div class="logo">Teach It Back</div>

    <div class="nav-links">
        <a href="notes.html">Your Notes</a>
        <a href="revise.html">Let's Revise</a>
        <a href="progress.html">Progress</a>
    </div>

    <button class="logout-btn" onclick="logout()">Log Out</button>
</nav>


<div class="dashboard-container">


    <div class="left-panel">
        <div class="welcome-bubble">
            <h2 id="welcome-text"></h2>
            <p>
                Every concept you explain strengthens your understanding.
                Today is another step closer to mastery. You've got this.
                Open your notes. Teach it back. Become unstoppable.
            </p>
        </div>
    </div>

    <button class="study-btn" onclick="window.location.href='setup.html'">
    LET'S STUDY!!
    </button>
    <div class="right-panel">
        <div class="notepad">
            <textarea id="user-notes" placeholder="Write your reminders, ideas, dates..."></textarea>
        </div>
    </div>

</div>
<footer class="bottom-bar">
    Nandana Narayan (24BCE1784)
</footer>

<script src="script.js"></script>
<script>
    function logout() {
        localStorage.removeItem("loggedIn");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
