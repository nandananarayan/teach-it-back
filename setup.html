<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teach It Back - Setup</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
<video autoplay muted loop id="bg-video">
    <source src="Refining_Game_Background_Prompt.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
</video>
<div class="overlay"></div>
<div class="study-panel"> 
    <h2>Start Your Study Session</h2>

    <label for="study-file">Upload your study material (.txt):</label>
    <input type="file" id="study-file" accept=".txt">

    <label for="study-subject">Subject:</label>
    <input type="text" id="study-subject" placeholder="Enter subject name">

    <label for="cafe-select">Choose your study cafe:</label>
    <select id="cafe-select">
        <option value="">-- Select Cafe --</option>
        <option value="summer">Summer Cafe</option>
        <option value="winter">Winter Cafe</option>
        <option value="autumn">Autumn Cafe</option>
        <option value="spring">Spring Cafe</option>
    </select>

    <button id="start-session-btn" class="go-btn">Get Set Go!</button>
</div>

<script src="setup.js"></script>
</body>
</html>


<script src="setup.js"></script>
</body>
</html>
