<!DOCTYPE html>
<html>
<head>
    <title>Teach It Back</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <video autoplay muted loop>
        <source src="Refining_Game_Background_Prompt.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>
    <div class="title-container">
        <div class="title">Teach It Back</div>
        <div class="description">
            Speak your knowledge. Be interrupted. Prove you understand.
        </div>
    </div>
    <div class="login-box">
        <h2>Welcome Back</h2>
        <input type="text" placeholder="Email" id="login-email">
        <input type="password" placeholder="Password" id="login-password">

        <button type="button" class="main-btn" onclick="login()">Login</button>


        <div class="toggle">
            <a href="signup.html">Late to the party? Create an account</a>
        </div>

    </div>
<script src="script.js"></script>

</body>
</html>
